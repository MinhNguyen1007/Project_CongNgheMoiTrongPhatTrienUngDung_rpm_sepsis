name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint-and-type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install tools
        run: pip install ruff mypy bandit pre-commit
      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  test-python:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        ports: [5432:5432]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: |
          pip install -r data-pipeline/requirements.txt
          pip install -r app/backend/requirements.txt
          pip install pytest pytest-cov
      - name: Run unit tests
        run: pytest tests/unit/ -v --cov --cov-report=xml
      - uses: codecov/codecov-action@v4
        if: always()
        continue-on-error: true

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json
      - name: Check frontend exists
        id: check
        run: |
          if [ -f package.json ]; then echo "exists=true" >> $GITHUB_OUTPUT; else echo "exists=false" >> $GITHUB_OUTPUT; fi
      - name: Install
        if: steps.check.outputs.exists == 'true'
        run: npm ci
      - name: Lint
        if: steps.check.outputs.exists == 'true'
        run: npm run lint
      - name: Test
        if: steps.check.outputs.exists == 'true'
        run: npm test -- --run

  build-images:
    runs-on: ubuntu-latest
    needs: [lint-and-type, test-python, test-frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./app/backend
          push: false
          tags: remote-patient-monitoring/backend:${{ github.sha }}
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./app/frontend
          push: false
          tags: remote-patient-monitoring/frontend:${{ github.sha }}
